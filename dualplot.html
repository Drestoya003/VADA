<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OHI vs Temperatura</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      background: #ffffff;
      color: #1a1a2e;
      font-family: 'DM Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: #1a1a2e;
      margin-bottom: 2px;
      text-align: center;
    }

    p.subtitle {
      font-size: 0.65rem;
      color: #2a6080;
      margin-bottom: 8px;
      text-align: center;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #chart { width: 100%; }

    .axis-left text  { fill: #1a6fa8; font-family: 'DM Mono', monospace; font-size: 10px; }
    .axis-right text { fill: #c0392b; font-family: 'DM Mono', monospace; font-size: 10px; }
    .axis-bottom text { fill: #4a7fa5; font-family: 'DM Mono', monospace; font-size: 10px; }
    .axis-left path,  .axis-left line  { stroke: #1a6fa8; }
    .axis-right path, .axis-right line { stroke: #c0392b; }
    .axis-bottom path, .axis-bottom line { stroke: #d0dde8; }

    .grid line { stroke: #eef2f6; stroke-dasharray: 3,3; }
    .grid path { stroke: none; }

    .axis-label-left  { fill: #1a6fa8; font-family: 'DM Mono', monospace; font-size: 10px; }
    .axis-label-right { fill: #c0392b; font-family: 'DM Mono', monospace; font-size: 10px; }

    .tooltip {
      position: fixed;
      background: rgba(255,255,255,0.97);
      border: 1px solid #a0c4d8;
      color: #1a1a2e;
      padding: 7px 11px;
      border-radius: 6px;
      font-size: 11px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 10;
    }

    .tooltip strong { color: #1a1a2e; display: block; margin-bottom: 3px; }
    .ohi-val  { color: #1a6fa8; }
    .temp-val { color: #c0392b; }

    #legend {
      display: flex;
      gap: 20px;
      margin-top: 6px;
      font-size: 10px;
      color: #2a6080;
      align-items: center;
    }

    .leg-item { display: flex; align-items: center; gap: 5px; }
    .leg-line { width: 24px; height: 3px; border-radius: 2px; }
    .leg-dashed-blue { width: 24px; height: 0; border-top: 3px dashed #1a6fa8; }
    .leg-dashed-red  { width: 24px; height: 0; border-top: 3px dashed #c0392b; }
  </style>
</head>
<body>
  <h1 id="chart-title">OHI Promedio Global vs Cambio de Temperatura</h1>
  <p class="subtitle" id="chart-subtitle">Promedio global · OHI 2012–2024 + proy. 2025–2030 · Temp 2012–2019 + proy. 2020–2024</p>
  <div id="chart"></div>
  <div id="legend">
    <div class="leg-item"><div class="leg-line" style="background:#1a6fa8;"></div><span style="color:#1a6fa8;">OHI Histórico</span></div>
    <div class="leg-item"><div class="leg-dashed-blue"></div><span style="color:#1a6fa8;">OHI Proyección</span></div>
    <div class="leg-item"><div class="leg-line" style="background:#c0392b;"></div><span style="color:#c0392b;">Temperatura Histórica</span></div>
    <div class="leg-item"><div class="leg-dashed-red"></div><span style="color:#c0392b;">Temperatura Proyección</span></div>
  </div>
  <div class="tooltip" id="tooltip"></div>

  <script>
    const histYearsOhi  = [2012,2013,2014,2015,2016,2017,2018,2019,2020,2021,2022,2023,2024];
    const projYearsOhi  = [2025,2026,2027,2028,2029,2030];
    const histYearsTemp = [2012,2013,2014,2015,2016,2017,2018,2019];
    const projYearsTemp = [2020,2021,2022,2023,2024];
    const years         = histYearsOhi;
    const projYears     = projYearsOhi;
    const allYears      = [...histYearsOhi, ...projYearsOhi];
    const margin     = { top: 14, right: 54, bottom: 42, left: 54 };
    const tooltip   = document.getElementById('tooltip');
    const chartTitle = document.getElementById('chart-title');
    const chartSub   = document.getElementById('chart-subtitle');

    Promise.all([
      d3.csv('OHI_full.csv'),
      d3.csv('CT_full.csv')
    ]).then(([ohiCsv, tempCsv]) => {

      // OHI: hist 2012-2024, proj 2025-2030 — ya vienen en el CSV
      const globalOhiData = histYearsOhi.map(y => {
        const vals = ohiCsv.map(d => parseFloat(d[y])).filter(v => !isNaN(v));
        return { year: y, value: d3.mean(vals) };
      });
      const globalOhiProj = projYearsOhi.map(y => {
        const vals = ohiCsv.map(d => parseFloat(d[y])).filter(v => !isNaN(v));
        return { year: y, value: d3.mean(vals), lo: null, hi: null };
      });

      // Temperatura: hist 2012-2019, proj 2020-2024 — ya vienen en CT_full
      const globalTempData = histYearsTemp.map(y => {
        const vals = tempCsv.map(d => parseFloat(d[`Y${y}`])).filter(v => !isNaN(v));
        return { year: y, value: d3.mean(vals) };
      });
      const globalTempProj = projYearsTemp.map(y => {
        const vals = tempCsv.map(d => parseFloat(d[`Y${y}`])).filter(v => !isNaN(v));
        return { year: y, value: d3.mean(vals), lo: null, hi: null };
      });

      // --- Dimensiones SVG ---
      const W0 = document.getElementById('chart').clientWidth || 800;
      const usedH = document.querySelector('h1').offsetHeight
                  + document.querySelector('p.subtitle').offsetHeight
                  + document.getElementById('legend').offsetHeight + 28;
      const H0 = Math.max(120, window.innerHeight - usedH);
      const W  = W0 - margin.left - margin.right;
      const H  = H0 - margin.top  - margin.bottom;

      const x = d3.scalePoint().domain(allYears).range([0, W]).padding(0.2);

      const svg = d3.select('#chart').append('svg')
        .attr('width', W0).attr('height', H0)
        .append('g').attr('transform', `translate(${margin.left},${margin.top})`);

      // Grid
      const gridG = svg.append('g').attr('class', 'grid');

      // Separador
      svg.append('line').attr('id', 'separator')
        .attr('x1', x(2024) + x.step() * 0.5).attr('x2', x(2024) + x.step() * 0.5)
        .attr('y1', 0).attr('y2', H)
        .attr('stroke', '#d0dde8').attr('stroke-dasharray', '4,4').attr('stroke-width', 1);

      // Ejes (se actualizan con las escalas)
      const axisBottomG = svg.append('g').attr('class', 'axis-bottom').attr('transform', `translate(0,${H})`);
      const axisLeftG   = svg.append('g').attr('class', 'axis-left');
      const axisRightG  = svg.append('g').attr('class', 'axis-right').attr('transform', `translate(${W},0)`);

      svg.append('text').attr('class', 'axis-label-left')
        .attr('transform', 'rotate(-90)').attr('x', -H/2).attr('y', -42)
        .attr('text-anchor', 'middle').text('OHI');
      svg.append('text').attr('class', 'axis-label-right')
        .attr('transform', 'rotate(90)').attr('x', H/2).attr('y', -W-42)
        .attr('text-anchor', 'middle').text('Cambio de Temperatura (°C)');

      // Capas de datos (se redibujan)
      const areaOhiPath    = svg.append('path').attr('id', 'area-ohi');
      const bandOhiPath    = svg.append('path').attr('id', 'band-ohi');
      const lineOhiPath    = svg.append('path').attr('id', 'line-ohi').attr('fill','none').attr('stroke','#1a6fa8').attr('stroke-width',2.5);
      const lineOhiProjPath= svg.append('path').attr('id', 'line-ohi-proj').attr('fill','none').attr('stroke','#1a6fa8').attr('stroke-width',2).attr('stroke-dasharray','6,4');
      const areaTempPath   = svg.append('path').attr('id', 'area-temp');
      const bandTempPath   = svg.append('path').attr('id', 'band-temp');
      const lineTempPath   = svg.append('path').attr('id', 'line-temp').attr('fill','none').attr('stroke','#c0392b').attr('stroke-width',2.5);
      const lineTempProjPath=svg.append('path').attr('id', 'line-temp-proj').attr('fill','none').attr('stroke','#c0392b').attr('stroke-width',2).attr('stroke-dasharray','6,4');
      const dotsG          = svg.append('g').attr('id', 'dots');
      const overlayG       = svg.append('g').attr('id', 'overlay');

      function render(ohiData, ohiProj, tempData, tempProj, label) {
        const ohiLast  = ohiData[ohiData.length - 1];
        const tempLast = tempData[tempData.length - 1];

        const allOhiVals  = [...ohiData, ...ohiProj].flatMap(d => [d.value, d.lo ?? d.value, d.hi ?? d.value]);
        const allTempVals = [...tempData, ...tempProj].flatMap(d => [d.value, d.lo ?? d.value, d.hi ?? d.value]);

        const yOhi  = d3.scaleLinear().domain([d3.min(allOhiVals)-0.5,  d3.max(allOhiVals)+0.5]).range([H,0]);
        const yTemp = d3.scaleLinear().domain([d3.min(allTempVals)-0.05, d3.max(allTempVals)+0.1]).range([H,0]);

        gridG.call(d3.axisLeft(yOhi).tickSize(-W).tickFormat('').ticks(5));
        axisBottomG.call(d3.axisBottom(x).tickFormat(d3.format('d')).tickValues(allYears.filter((_,i) => i%2===0)));
        axisLeftG.call(d3.axisLeft(yOhi).ticks(5));
        axisRightG.call(d3.axisRight(yTemp).ticks(5));

        const lineGen = yScale => d3.line().x(d => x(d.year)).y(d => yScale(d.value)).curve(d3.curveCatmullRom);
        const bandGen = yScale => d3.area().x(d => x(d.year)).y0(d => yScale(d.lo)).y1(d => yScale(d.hi)).curve(d3.curveCatmullRom);
        const areaGen = (yScale) => d3.area().x(d => x(d.year)).y0(H).y1(d => yScale(d.value)).curve(d3.curveCatmullRom);

        areaOhiPath.datum(ohiData).attr('fill','rgba(26,111,168,0.08)').attr('d', areaGen(yOhi));
        bandOhiPath.datum([{year:ohiLast.year,lo:ohiLast.value,hi:ohiLast.value},...ohiProj]).attr('fill','rgba(26,111,168,0.12)').attr('d',bandGen(yOhi));
        lineOhiPath.datum(ohiData).attr('d', lineGen(yOhi)(ohiData));
        lineOhiProjPath.datum([ohiLast,...ohiProj]).attr('d', lineGen(yOhi)([ohiLast,...ohiProj]));

        areaTempPath.datum(tempData).attr('fill','rgba(192,57,43,0.08)').attr('d', areaGen(yTemp));
        bandTempPath.datum([{year:tempLast.year,lo:tempLast.value,hi:tempLast.value},...tempProj]).attr('fill','rgba(192,57,43,0.12)').attr('d',bandGen(yTemp));
        lineTempPath.datum(tempData).attr('d', lineGen(yTemp)(tempData));
        lineTempProjPath.datum([tempLast,...tempProj]).attr('d', lineGen(yTemp)([tempLast,...tempProj]));

        dotsG.selectAll('circle').remove();
        dotsG.selectAll('.dh').data(ohiData).enter().append('circle')
          .attr('cx',d=>x(d.year)).attr('cy',d=>yOhi(d.value)).attr('r',3.5).attr('fill','#1a6fa8');
        dotsG.selectAll('.dp').data(ohiProj).enter().append('circle')
          .attr('cx',d=>x(d.year)).attr('cy',d=>yOhi(d.value)).attr('r',3).attr('fill','none').attr('stroke','#1a6fa8').attr('stroke-width',1.5);
        dotsG.selectAll('.th').data(tempData).enter().append('circle')
          .attr('cx',d=>x(d.year)).attr('cy',d=>yTemp(d.value)).attr('r',3.5).attr('fill','#c0392b');
        dotsG.selectAll('.tp').data(tempProj).enter().append('circle')
          .attr('cx',d=>x(d.year)).attr('cy',d=>yTemp(d.value)).attr('r',3).attr('fill','none').attr('stroke','#c0392b').attr('stroke-width',1.5);

        overlayG.selectAll('rect').remove();
        overlayG.selectAll('rect').data(allYears).enter().append('rect')
          .attr('x', y => x(y) - x.step()*0.4).attr('y',0)
          .attr('width', x.step()*0.8).attr('height',H).attr('fill','transparent')
          .on('mousemove', (event, y) => {
            const o = [...ohiData,...ohiProj].find(d=>d.year===y);
            const t = [...tempData,...tempProj].find(d=>d.year===y);
            const isProj = projYears.includes(y);
            tooltip.style.opacity = 1;
            tooltip.style.left = (event.clientX+14)+'px';
            tooltip.style.top  = (event.clientY-30)+'px';
            tooltip.innerHTML = `<strong>${y}${isProj?' · Proyección':''}</strong>
              <span class="ohi-val">OHI: ${o.value.toFixed(2)}${o.lo!==undefined?` [${o.lo.toFixed(2)}, ${o.hi.toFixed(2)}]`:''}</span><br>
              ${t ? `<span class="temp-val">Temp: ${t.value.toFixed(3)} °C${t.lo!==undefined?` [${t.lo.toFixed(3)}, ${t.hi.toFixed(3)}]`:''}</span>` : ''}`;
          })
          .on('mouseleave', () => { tooltip.style.opacity = 0; });

        chartTitle.textContent = label
          ? `OHI vs Temperatura — ${label}`
          : 'OHI Promedio Global vs Cambio de Temperatura';
        chartSub.textContent = label
          ? `${label} · Histórico 2012–2019 · Proyección OHI hasta 2030`
          : 'Promedio global · Histórico 2012–2019 · Proyección 2020–2030';
      }

      // Mostrar global al inicio
      render(globalOhiData, globalOhiProj, globalTempData, globalTempProj, null);

      // Click desde el mapa
      window.addEventListener('message', e => {
        if (e.data?.type !== 'countryClick') return;
        const name = e.data.country;

        const ohiRow = ohiCsv.find(d => d.REF_AREA_LABEL === name);
        const countryOhiData = ohiRow
          ? histYearsOhi.map(y => ({ year: y, value: parseFloat(ohiRow[y]) })).filter(d => !isNaN(d.value))
          : globalOhiData;
        const countryOhiProj = ohiRow
          ? projYearsOhi.map(y => ({ year: y, value: parseFloat(ohiRow[y]), lo: null, hi: null })).filter(d => !isNaN(d.value))
          : globalOhiProj;

        const tempRow = tempCsv.find(d => d.Area === name ||
          d.Area.toLowerCase().includes(name.toLowerCase()) ||
          name.toLowerCase().includes(d.Area.toLowerCase()));
        const countryTempData = tempRow
          ? histYearsTemp.map(y => ({ year: y, value: parseFloat(tempRow[`Y${y}`]) })).filter(d => !isNaN(d.value))
          : globalTempData;
        const countryTempProj = tempRow
          ? projYearsTemp.map(y => ({ year: y, value: parseFloat(tempRow[`Y${y}`]), lo: null, hi: null })).filter(d => !isNaN(d.value))
          : globalTempProj;

        render(
          countryOhiData.length  >= 2 ? countryOhiData  : globalOhiData,
          countryOhiProj.length  >= 1 ? countryOhiProj  : globalOhiProj,
          countryTempData.length >= 2 ? countryTempData : globalTempData,
          countryTempProj.length >= 1 ? countryTempProj : globalTempProj,
          name
        );
      });
    });
  </script>
</body>
</html>
