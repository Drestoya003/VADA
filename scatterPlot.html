<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OHI — Scatter Plot</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: #ffffff;
      color: #1a1a2e;
      font-family: 'DM Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      position: relative;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: #1a6fa8;
      margin-bottom: 2px;
      text-align: center;
    }
    p.subtitle {
      font-size: 0.65rem;
      color: #2a6080;
      margin-bottom: 8px;
      text-align: center;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    #chart { width: 100%; }
    .axis text { fill: #4a7fa5; font-family: 'DM Mono', monospace; font-size: 10px; }
    .axis path, .axis line { stroke: #d0dde8; }
    .grid line { stroke: #eef2f6; stroke-dasharray: 3,3; }
    .grid path { stroke: none; }
    .dot {
      opacity: 0.6;
      transition: opacity 0.3s, r 0.3s;
      cursor: pointer;
    }
    .dot.faded { opacity: 0.08; }
    .dot.highlighted { opacity: 1; stroke: #c0392b; stroke-width: 2; }
    .axis-label {
      fill: #2a6080;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
    }
    .tooltip {
      position: fixed;
      background: rgba(255,255,255,0.97);
      border: 1px solid #a0c4d8;
      color: #1a1a2e;
      padding: 7px 11px;
      border-radius: 6px;
      font-size: 11px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 10;
    }
    .tooltip strong { color: #1a6fa8; display: block; margin-bottom: 2px; }
    #controls {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
      align-self: flex-start;
      z-index: 5;
    }
    #year-select, #play-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: #1a1a2e;
      border: 1px solid #d0dde8;
      border-radius: 6px;
      padding: 4px 10px;
      background: #ffffff;
      cursor: pointer;
      outline: none;
    }
    #year-select { width: 90px; }
    #play-btn {
      width: 95px;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    #play-btn:hover {
      background: #1a6fa8;
      color: #ffffff;
      border-color: #1a6fa8;
    }
    #play-btn.playing {
      background: #c0392b;
      color: #ffffff;
      border-color: #c0392b;
    }
    #year-select:focus, #play-btn:focus { border-color: #1a6fa8; }
  </style>
</head>
<body>
  <div id="controls">
    <select id="year-select"></select>
    <button id="play-btn">▶ Animar</button>
  </div>

  <h1>OHI vs Cambio de Temperatura</h1>
  <p class="subtitle" id="chart-subtitle">Año seleccionado: 2024</p>
  <div id="chart"></div>
  <div class="tooltip" id="tooltip"></div>

  <script>
    const years = [2012,2013,2014,2015,2016,2017,2018,2019];
    let selectedYear = 2012;
    let animationTimer = null;
    let isPlaying = false;
    const ANIM_INTERVAL = 900;

    const margin = { top: 10, right: 20, bottom: 46, left: 54 };
    const tooltip = document.getElementById('tooltip');
    const subtitle = document.getElementById('chart-subtitle');
    const yearSelect = document.getElementById('year-select');
    const playBtn = document.getElementById('play-btn');

    years.forEach(y => {
      const opt = document.createElement('option');
      opt.value = y;
      opt.textContent = y;
      if (y === selectedYear) opt.selected = true;
      yearSelect.appendChild(opt);
    });

    const normalize = s => (s || '').toLowerCase()
      .replace(/[^a-z0-9 ]/g, '')
      .replace(/\s+/g, ' ')
      .trim();

    const aliases = {
      'usa': 'United States of America',
      'united states': 'United States of America',
      'unitedarab emirates': 'United Arab Emirates',
      'russian federation': 'Russian Federation',
      'korea rep.': 'Republic of Korea',
      "korea dem. people's rep.": "Democratic People's Republic of Korea",
      'syrian arab republic': 'Syrian Arab Republic',
      'iran islamic rep.': 'Iran (Islamic Republic of)',
      'viet nam': 'Viet Nam',
      'lao pdr': "Lao People's Democratic Republic",
      'congo dem. rep.': 'Democratic Republic of the Congo',
      'congo rep.': 'Congo',
      "cote d'ivoire": "Côte d'Ivoire",
      'turkiye': 'Turkey',
      'cabo verde': 'Cabo Verde',
      'timor-leste': 'Timor-Leste',
      'bahamas the': 'Bahamas',
      'gambia the': 'Gambia',
      'egypt arab rep.': 'Egypt',
      'yemen rep.': 'Yemen',
      'micronesia fed. sts.': 'Micronesia (Federated States of)',
      'west bank and gaza': 'Palestine',
      'brunei darussalam': 'Brunei Darussalam',
      'st. lucia': 'Saint Lucia',
      'st. kitts and nevis': 'Saint Kitts and Nevis',
      'st. vincent and the grenadines': 'Saint Vincent and the Grenadines',
      'england': 'United Kingdom',
      'world': 'World'
    };

    function findTempRow(ohiLabel, tempCsv) {
      const n = normalize(ohiLabel);
      const aliased = aliases[n];
      let row = tempCsv.find(d => d.Area === ohiLabel);
      if (row) return row;
      if (aliased) {
        row = tempCsv.find(d => d.Area === aliased);
        if (row) return row;
      }
      row = tempCsv.find(d => normalize(d.Area) === n);
      if (row) return row;
      row = tempCsv.find(d => {
        const a = normalize(d.Area);
        return a.includes(n) || n.includes(a);
      });
      return row || null;
    }

    Promise.all([
      d3.csv('OHI_full.csv'),
      d3.csv('CT_full.csv')
    ]).then(([ohiCsv, tempCsv]) => {

      const matched = ohiCsv.map(row => {
        const tempRow = findTempRow(row.REF_AREA_LABEL, tempCsv);
        return { name: row.REF_AREA_LABEL, ohiRow: row, tempRow };
      }).filter(d => d.tempRow !== null && d.name !== 'World');

      let allOhi = [], allTemp = [];
      matched.forEach(d => {
        years.forEach(y => {
          const o = parseFloat(d.ohiRow[y]);
          const t = parseFloat(d.tempRow['Y' + y]);
          if (!isNaN(o)) allOhi.push(o);
          if (!isNaN(t)) allTemp.push(t);
        });
      });
      const ohiDomain = [d3.min(allOhi) - 1, d3.max(allOhi) + 1];
      const tempDomain = [d3.min(allTemp) - 0.1, d3.max(allTemp) + 0.1];

      const W0 = document.getElementById('chart').clientWidth || 400;
      const usedH = document.querySelector('h1').offsetHeight
                  + document.querySelector('p.subtitle').offsetHeight
                  + document.getElementById('controls').offsetHeight
                  + 24;
      const H0 = Math.max(120, window.innerHeight - usedH);
      const W = W0 - margin.left - margin.right;
      const H = H0 - margin.top - margin.bottom;

      const svg = d3.select('#chart').append('svg')
        .attr('width', W0).attr('height', H0)
        .append('g').attr('transform', 'translate(' + margin.left + ',' + margin.top + ')');

      const x = d3.scaleLinear().domain(ohiDomain).range([0, W]);
      const y = d3.scaleLinear().domain(tempDomain).range([H, 0]);

      svg.append('g').attr('class', 'grid')
        .call(d3.axisLeft(y).tickSize(-W).tickFormat('').ticks(6));
      svg.append('g').attr('class', 'grid')
        .attr('transform', 'translate(0,' + H + ')')
        .call(d3.axisBottom(x).tickSize(-H).tickFormat('').ticks(6));
      svg.append('g').attr('class', 'axis')
        .attr('transform', 'translate(0,' + H + ')')
        .call(d3.axisBottom(x).ticks(6));
      svg.append('g').attr('class', 'axis')
        .call(d3.axisLeft(y).ticks(6));

      const xLabel = svg.append('text').attr('class', 'axis-label')
        .attr('x', W / 2).attr('y', H + 38)
        .attr('text-anchor', 'middle');
      svg.append('text').attr('class', 'axis-label')
        .attr('transform', 'rotate(-90)')
        .attr('x', -H / 2).attr('y', -42)
        .attr('text-anchor', 'middle')
        .text('Cambio de Temperatura (°C)');

      svg.append('line')
        .attr('x1', 0).attr('x2', W)
        .attr('y1', y(0)).attr('y2', y(0))
        .attr('stroke', '#aaaaaa')
        .attr('stroke-dasharray', '4,3')
        .attr('stroke-width', 1);

      const colorScale = d3.scaleOrdinal(
        d3.schemeTableau10.concat(d3.schemePastel1).concat(d3.schemeSet3)
      );

      const dotsGroup = svg.append('g').attr('class', 'dots-group');

      function update(year, duration) {
        if (duration === undefined) duration = 400;
        const data = matched.map(d => {
          const ohi = parseFloat(d.ohiRow[year]);
          const temp = parseFloat(d.tempRow['Y' + year]);
          if (isNaN(ohi) || isNaN(temp)) return null;
          return { name: d.name, ohi: ohi, temp: temp };
        }).filter(d => d !== null);

        xLabel.text('OHI Score (' + year + ')');
        subtitle.textContent = 'Año seleccionado: ' + year;

        const sel = dotsGroup.selectAll('circle').data(data, d => d.name);

        sel.exit().remove();

        const enter = sel.enter().append('circle')
          .attr('class', 'dot')
          .attr('r', 5)
          .style('fill', d => colorScale(d.name))
          .attr('cx', d => x(d.ohi))
          .attr('cy', d => y(d.temp))
          .on('mousemove', (event, d) => {
            tooltip.style.opacity = 1;
            tooltip.style.left = (event.clientX + 14) + 'px';
            tooltip.style.top = (event.clientY - 30) + 'px';
            tooltip.innerHTML = '<strong>' + d.name + '</strong>' +
              'OHI: ' + d.ohi.toFixed(2) + '<br>' +
              'Temp: ' + d.temp.toFixed(3) + ' °C';
          })
          .on('mouseleave', () => { tooltip.style.opacity = 0; });

        enter.merge(sel)
          .attr('data-name', d => d.name)
          .transition().duration(duration).ease(d3.easeCubicInOut)
          .attr('cx', d => x(d.ohi))
          .attr('cy', d => y(d.temp));
      }

      update(selectedYear, 0);

      yearSelect.addEventListener('change', () => {
        if (isPlaying) stopAnimation();
        selectedYear = +yearSelect.value;
        update(selectedYear);
      });

      function startAnimation() {
        isPlaying = true;
        playBtn.textContent = '⏸ Pausar';
        playBtn.classList.add('playing');

        if (selectedYear >= years[years.length - 1]) {
          selectedYear = years[0];
          yearSelect.value = selectedYear;
          update(selectedYear, 0);
        }

        animationTimer = setInterval(() => {
          const idx = years.indexOf(selectedYear);
          if (idx >= years.length - 1) {
            stopAnimation();
            return;
          }
          selectedYear = years[idx + 1];
          yearSelect.value = selectedYear;
          update(selectedYear, ANIM_INTERVAL * 0.85);
        }, ANIM_INTERVAL);
      }

      function stopAnimation() {
        isPlaying = false;
        playBtn.textContent = '▶ Animar';
        playBtn.classList.remove('playing');
        if (animationTimer) {
          clearInterval(animationTimer);
          animationTimer = null;
        }
      }

      playBtn.addEventListener('click', () => {
        if (isPlaying) stopAnimation();
        else startAnimation();
      });

      window.addEventListener('message', e => {
        if (e.data && e.data.type === 'countryClick') {
          const name = e.data.country;
          const allDots = dotsGroup.selectAll('circle');
          allDots.classed('faded', true).classed('highlighted', false).attr('r', 5);
          allDots.filter(d => d.name === name)
            .classed('faded', false)
            .classed('highlighted', true)
            .attr('r', 9);
        } else if (e.data && e.data.type === 'resetGlobal') {
          dotsGroup.selectAll('circle')
            .classed('faded', false)
            .classed('highlighted', false)
            .attr('r', 5);
        }
      });
    });
  </script>
</body>
</html>
